name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build & Release macOS DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.4"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: apps/app_mobile

      - name: Build macOS release
        run: flutter build macos --release
        working-directory: apps/app_mobile

      - name: Sign app (ad-hoc)
        run: |
          codesign --sign - --deep --force \
            "apps/app_mobile/build/macos/Build/Products/Release/ici_transcript.app"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "IciTranscript" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "ici_transcript.app" 180 170 \
            --hide-extension "ici_transcript.app" \
            --app-drop-link 480 170 \
            --no-internet-enable \
            "IciTranscript-${{ github.ref_name }}.dmg" \
            "apps/app_mobile/build/macos/Build/Products/Release/ici_transcript.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: IciTranscript-${{ github.ref_name }}.dmg
          generate_release_notes: true
          body: |
            ## Installation

            1. Télécharger `IciTranscript-${{ github.ref_name }}.dmg`
            2. Ouvrir le DMG et glisser IciTranscript dans Applications
            3. **Clic droit > Ouvrir** (première fois, Gatekeeper avertit car signature ad-hoc)
            4. L'app vous guide pour installer `uv` si nécessaire

            ## Prérequis

            - macOS 13+ (Apple Silicon recommandé pour MLX)
            - `uv` — installé automatiquement par l'app au premier lancement
